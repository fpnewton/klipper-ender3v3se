name: Build Firmware

on:
  push:
    branches:
      - master
    paths:
      - '.github/workflows/build-firmware.yml'
      - 'Makefile'
      - 'src/**'
      - 'klippy/**'
      - 'lib/**'
      - 'scripts/**'
      - 'config.*'
      - 'make-*.sh'
  pull_request:
    paths:
      - '.github/workflows/build-firmware.yml'
      - 'Makefile'
      - 'src/**'
      - 'klippy/**'
      - 'lib/**'
      - 'scripts/**'
      - 'config.*'
      - 'make-*.sh'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: ender3v3se
            script: make-ender3v3se.sh
            artifact: klipper-ender3v3se.bin
          - name: ebb42
            script: make-ebb42.sh
            artifact: klipper-ebb42.bin
          - name: adxl345
            script: make-adxl345.sh
            artifact: klipper-adxl345.bin

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            gcc-arm-none-eabi \
            binutils-arm-none-eabi \
            libnewlib-arm-none-eabi \
            python3 \
            python3-venv \
            python3-pip

      - name: Make build scripts executable
        run: chmod +x make-*.sh

      - name: Build ${{ matrix.name }}
        run: |
          ./${{ matrix.script }} clean
          ./${{ matrix.script }}

      - name: Prepare artifact
        run: |
          mkdir -p artifacts
          cp out/klipper.bin artifacts/${{ matrix.artifact }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}-firmware
          path: artifacts/${{ matrix.artifact }}
